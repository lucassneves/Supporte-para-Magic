<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" id="meta-theme-color" content="#0d0e15">
    <title>Magic Toolkit - Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4d4d;
            --primary-glow: rgba(255, 77, 77, 0.5);
            --bg-color: #0d0e15;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-bottom: 80px;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
            transition: background-color 0.5s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .ambient-light {
            position: absolute;
            width: 150vw;
            height: 150vw;
            background: radial-gradient(circle, var(--primary-glow) 0%, rgba(13, 14, 21, 0) 50%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
            transition: background 0.5s ease, opacity 0.5s ease;
        }

        .header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            z-index: 10;
        }

        .title-container {
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 4px;
            transition: color 0.3s ease;
        }

        .theme-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .theme-btn:active {
            transform: scale(0.9);
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .theme-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding-top: 90px;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: rgba(13, 14, 21, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            background: none;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 25%;
            height: 100%;
            gap: 5px;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item.active svg {
            transform: translateY(-3px);
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 90vw;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .big-display {
            font-size: clamp(4rem, 20vw, 8rem);
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 40px var(--primary-glow), 0 0 10px rgba(255, 255, 255, 0.5);
            line-height: 1;
            letter-spacing: -2px;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 20px;
        }

        .big-display.animate {
            transform: scale(1.15);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button.btn-stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 500;
            padding: 15px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.btn-stat:active {
            transform: scale(0.95);
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        button.btn-stat.secondary {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1rem;
            font-weight: 500;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .reset-btn:active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        .reset-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* ====== LIFE SETUP & GAME ====== */
        #life-setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .setup-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .setup-title {
            text-align: center;
            margin-bottom: 15px;
            font-weight: 500;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn-grid-half {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 15px;
            padding: 15px 0;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-select.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .start-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        #life-game {
            display: none;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 80px;
            padding-bottom: 80px;
        }

        .grid-1 {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .grid-6 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .grid-8 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
        }

        .span-2 {
            grid-column: span 2;
        }

        .player-area-dyn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: background 0.3s;
        }

        .player-area-dyn.inverted {
            transform: rotate(180deg);
            background: rgba(0, 0, 0, 0.15);
        }

        .dyn-life {
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 800;
            text-shadow: 0 0 20px var(--primary-glow);
            z-index: 1;
            transition: transform 0.1s;
        }

        .dyn-life.animate {
            transform: scale(1.15);
        }

        .dyn-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            z-index: 2;
            opacity: 1;
            transition: 0.2s;
        }

        .dyn-btn {
            width: 50%;
            height: 100%;
            background: transparent;
            border: none;
            font-family: inherit;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.05);
            font-size: 2.5rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .dyn-btn.minus {
            justify-content: flex-start;
            padding-left: 15%;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.3) 0%, transparent 100%);
        }

        .dyn-btn.plus {
            justify-content: flex-end;
            padding-right: 15%;
            background: linear-gradient(-90deg, rgba(0, 0, 0, 0.3) 0%, transparent 100%);
        }

        .dyn-btn:active {
            color: rgba(255, 255, 255, 0.4);
        }

        .dyn-btn.minus:active {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
        }

        .dyn-btn.plus:active {
            background: linear-gradient(-90deg, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
        }

        .center-menu-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-color);
            border: 2px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 50%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .center-menu-btn:active {
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--primary-color);
        }

        .center-menu-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ====== DICE ====== */
        .dice-result {
            font-size: 6rem;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 30px var(--primary-glow);
        }

        /* ====== COUNTERS ====== */
        .counter-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .counter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .counter-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .counter-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .counter-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .counter-name {
            font-weight: 500;
            font-size: 1.2rem;
        }

        .counter-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .c-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .c-val {
            font-size: 1.8rem;
            font-weight: bold;
            width: 40px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="ambient-light" id="ambientLight"></div>

    <div class="header" id="mainHeader">
        <div class="title-container">
            <div class="title">Toolkit</div>
            <div class="subtitle" id="tabSubtitle">VIDA MULTIPLAYER</div>
        </div>
        <button class="theme-btn" onclick="changeTheme()" aria-label="Mudar Tema">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12,22C6.49,22 2,17.51 2,12C2,6.49 6.49,2 12,2C17.51,2 22,6.49 22,12C22,17.51 17.51,22 12,22M12,4C7.58,4 4,7.58 4,12C4,16.42 7.58,20 12,20C16.42,20 20,16.42 20,12C20,7.58 16.42,4 12,4M12,6V18C15.31,18 18,15.31 18,12C18,8.69 15.31,6 12,6Z" />
            </svg>
        </button>
    </div>

    <!-- TAB 1: LIFE COUNTER -->
    <div class="tab-content active" id="tab-life" style="padding-top: 0;">

        <!-- Setup Menu -->
        <div id="life-setup">
            <div class="setup-panel">
                <div class="setup-title">TOTAL DE JOGADORES</div>
                <div class="btn-grid">
                    <button class="btn-select" id="tp-1" onclick="setPlayers(1)">1</button>
                    <button class="btn-select active" id="tp-2" onclick="setPlayers(2)">2</button>
                    <button class="btn-select" id="tp-3" onclick="setPlayers(3)">3</button>
                    <button class="btn-select" id="tp-4" onclick="setPlayers(4)">4</button>
                    <button class="btn-select" id="tp-5" onclick="setPlayers(5)">5</button>
                    <button class="btn-select" id="tp-6" onclick="setPlayers(6)">6</button>
                    <button class="btn-select" id="tp-7" onclick="setPlayers(7)">7</button>
                    <button class="btn-select" id="tp-8" onclick="setPlayers(8)">8</button>
                </div>

                <div class="setup-title">VIDA INICIAL</div>
                <div class="btn-grid-half">
                    <button class="btn-select active" id="tl-40" onclick="setLife(40)">40</button>
                    <button class="btn-select" id="tl-20" onclick="setLife(20)">20</button>
                </div>

                <button class="start-btn" onclick="startGame()">INICIAR PARTIDA</button>
            </div>
        </div>

        <!-- Dynamic Game Grid -->
        <div id="life-game"></div>

    </div>

    <!-- TAB 2: DICE & COIN -->
    <div class="tab-content" id="tab-dice">
        <div class="dice-result big-display" id="diceResult">--</div>
        <div class="glass-panel">
            <div class="controls">
                <button class="btn-stat" onclick="rollTarget(20)">D20</button>
                <button class="btn-stat" onclick="rollTarget(6)">D6</button>
            </div>
            <button class="btn-stat" style="width:100%; margin-top:5px;" onclick="flipCoin()">MOEDA</button>
        </div>
    </div>

    <!-- TAB 3: COUNTERS -->
    <div class="tab-content" id="tab-counters">
        <div class="glass-panel" style="padding: 15px;">
            <div class="counter-list">
                <!-- Poison -->
                <div class="counter-item">
                    <div class="counter-info">
                        <div class="counter-icon" style="background: rgba(0, 255, 100, 0.2);"><svg viewBox="0 0 24 24">
                                <path
                                    d="M12,2A6,6 0 0,1 18,8C18,11 15.5,13.5 12.8,16L12,17C12,17 11.2,16 8.5,13.5C5.5,11 3,8.5 3,5.5A3.5,3.5 0 0,1 6.5,2C8,2 9.5,3 10,4.5C10.5,3 12,2 13.5,2Z" />
                            </svg></div>
                        <div class="counter-name">Veneno</div>
                    </div>
                    <div class="counter-actions">
                        <button class="c-btn" onclick="adjCounter('cPoison', -1)">-</button>
                        <div class="c-val" id="cPoison">0</div>
                        <button class="c-btn" onclick="adjCounter('cPoison', 1)">+</button>
                    </div>
                </div>
                <!-- Energy -->
                <div class="counter-item">
                    <div class="counter-info">
                        <div class="counter-icon" style="background: rgba(0, 191, 255, 0.2);"><svg viewBox="0 0 24 24">
                                <path d="M11,15H6L13,1V9H18L11,23V15Z" />
                            </svg></div>
                        <div class="counter-name">Energia</div>
                    </div>
                    <div class="counter-actions">
                        <button class="c-btn" onclick="adjCounter('cEnergy', -1)">-</button>
                        <div class="c-val" id="cEnergy">0</div>
                        <button class="c-btn" onclick="adjCounter('cEnergy', 1)">+</button>
                    </div>
                </div>
                <!-- Comandante -->
                <div class="counter-item">
                    <div class="counter-info">
                        <div class="counter-icon" style="background: rgba(255, 215, 0, 0.2);"><svg viewBox="0 0 24 24">
                                <path d="M12,2L1,21H23M12,6L19.53,19H4.47" />
                            </svg></div>
                        <div class="counter-name">Cast Cmdt.</div>
                    </div>
                    <div class="counter-actions">
                        <button class="c-btn" onclick="adjCounter('cCmd', -1)">-</button>
                        <div class="c-val" id="cCmd">0</div>
                        <button class="c-btn" onclick="adjCounter('cCmd', 1)">+</button>
                    </div>
                </div>
            </div>
            <button class="reset-btn" onclick="resetCounters()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
                </svg>
                Zerar Contadores
            </button>
        </div>
    </div>

    <!-- TAB 4: CREATURE (Original App) -->
    <div class="tab-content" id="tab-creature">
        <div class="big-display" id="power">0 / 0</div>
        <div class="glass-panel">
            <div class="controls">
                <button class="btn-stat" onclick="changePower(1)">+1</button>
                <button class="btn-stat secondary" onclick="changePower(10)">+10</button>
                <button class="btn-stat" onclick="changePower(-1)">-1</button>
                <button class="btn-stat secondary" onclick="changePower(-10)">-10</button>
            </div>
            <button class="reset-btn" onclick="resetPower()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
                </svg>
                Zerar Status
            </button>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('life', 'VIDA MULTIPLAYER')">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z" />
            </svg>
            Vida
        </button>
        <button class="nav-item" onclick="switchTab('dice', 'DADOS & MOEDA')">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12,2L19.36,6.24L21,14.61L12,22L3,14.61L4.64,6.24L12,2M12,4.31L6.35,7.57L6.87,13.91L12,19.69L17.13,13.91L17.65,7.57L12,4.31M12.5,7.5C13.33,7.5 14,8.17 14,9C14,9.83 13.33,10.5 12.5,10.5C11.67,10.5 11,9.83 11,9C11,8.17 11.67,7.5 12.5,7.5M8.5,12.5C9.33,12.5 10,13.17 10,14C10,14.83 9.33,15.5 8.5,15.5C7.67,15.5 7,14.83 7,14C7,13.17 7.67,12.5 8.5,12.5M16.5,12.5C17.33,12.5 18,13.17 18,14C18,14.83 17.33,15.5 16.5,15.5C15.67,15.5 15,14.83 15,14C15,13.17 15.67,12.5 16.5,12.5Z" />
            </svg>
            Dados
        </button>
        <button class="nav-item" onclick="switchTab('counters', 'MARCADORES')">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12,2L22,8L12,14L2,8L12,2M12,16L22,10V14.5L12,20.5L2,14.5V10L12,16M12,18.5L20,13.7V11.7L12,16.5L4,11.7V13.7L12,18.5Z" />
            </svg>
            Marcadores
        </button>
        <button class="nav-item" onclick="switchTab('creature', 'STATUS DA CRIATURA')">
            <svg viewBox="0 0 24 24">
                <path
                    d="M16 11C17.11 11 18 11.9 18 13C18 14.11 17.11 15 16 15C14.9 15 14 14.11 14 13C14 11.9 14.9 11 16 11M8 11C9.11 11 10 11.9 10 13C10 14.11 9.11 15 8 15C6.9 15 6 14.11 6 13C6 11.9 6.9 11 8 11M4H20V22H4V11Z" />
            </svg>
            Criatura
        </button>
    </nav>

    <script>
        let audioCtx;
        let wakeLock = null;

        // --- THEME ---
        const themes = [
            { primary: '#ff4d4d', glow: 'rgba(255, 77, 77, 0.4)' },
            { primary: '#00e5ff', glow: 'rgba(0, 229, 255, 0.4)' },
            { primary: '#00f260', glow: 'rgba(0, 242, 96, 0.3)' },
            { primary: '#b366ff', glow: 'rgba(179, 102, 255, 0.5)' },
            { primary: '#ffb347', glow: 'rgba(255, 179, 71, 0.4)' }
        ];
        let currentThemeIndex = 0;

        function changeTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const t = themes[currentThemeIndex];
            document.documentElement.style.setProperty('--primary-color', t.primary);
            document.documentElement.style.setProperty('--primary-glow', t.glow);
            playFeedback(true);
        }

        // --- WAKELOCK ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock falhou:', err);
            }
        }
        document.body.addEventListener('click', requestWakeLock, { once: true });
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });

        // --- AUDIO / VIBRATION ---
        function playFeedback(isSoft = false, isMetal = false) {
            if (navigator.vibrate) {
                if (isSoft) navigator.vibrate(15);
                else navigator.vibrate([20, 10, 20]);
            }

            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                if (isMetal) {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else {
                    oscillator.type = isSoft ? 'sine' : 'triangle';
                    const freqStart = isSoft ? 500 : 350;
                    const freqEnd = isSoft ? 800 : 150;
                    oscillator.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(1.5, audioCtx.currentTime + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                }
            } catch (e) { }
        }

        function triggerAnim(element) {
            element.classList.remove('animate');
            void element.offsetWidth;
            element.classList.add('animate');
            setTimeout(() => element.classList.remove('animate'), 100);
        }

        // --- NAVIGATION ---
        function switchTab(tabId, subtitle) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('tabSubtitle').innerText = subtitle;

            if (tabId === 'life' && isGameActive) {
                document.getElementById('mainHeader').style.display = 'none';
                document.querySelector('.bottom-nav').style.background = 'rgba(13, 14, 21, 0.4)';
            } else {
                document.getElementById('mainHeader').style.display = 'flex';
                document.querySelector('.bottom-nav').style.background = 'rgba(13, 14, 21, 0.8)';
            }
            playFeedback(true);
        }

        // --- DYNAMIC LIFE COUNTER APP ---
        let targetPlayers = 2;
        let targetLife = 40;
        let pLifes = [];
        let isGameActive = false;

        function setPlayers(n) {
            targetPlayers = n;
            for (let i = 1; i <= 8; i++) document.getElementById(`tp-${i}`).classList.remove('active');
            document.getElementById(`tp-${n}`).classList.add('active');
            playFeedback(true);
        }

        function setLife(l) {
            targetLife = l;
            document.getElementById('tl-40').classList.remove('active');
            document.getElementById('tl-20').classList.remove('active');
            document.getElementById(`tl-${l}`).classList.add('active');
            playFeedback(true);
        }

        function startGame() {
            isGameActive = true;
            pLifes = Array(targetPlayers).fill(targetLife);

            document.getElementById('life-setup').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'none';
            document.querySelector('.bottom-nav').style.background = 'rgba(13, 14, 21, 0.4)';

            const game = document.getElementById('life-game');
            game.style.display = 'grid';
            game.className = '';

            if (targetPlayers === 1) game.classList.add('grid-1');
            else if (targetPlayers === 2) game.classList.add('grid-2');
            else if (targetPlayers <= 4) game.classList.add('grid-4');
            else if (targetPlayers <= 6) game.classList.add('grid-6');
            else game.classList.add('grid-8');

            let invertedCount = Math.floor(targetPlayers / 2);
            let html = '';

            for (let i = 0; i < targetPlayers; i++) {
                let invClass = (i < invertedCount && targetPlayers > 1) ? 'inverted' : '';
                let spanClass = ((targetPlayers === 3 && i === 2) ||
                    (targetPlayers === 5 && i === 4) ||
                    (targetPlayers === 7 && i === 6)) ? 'span-2' : '';

                html += `
                    <div class="player-area-dyn ${invClass} ${spanClass}">
                        <div class="dyn-controls">
                            <button class="dyn-btn minus" onclick="modLife(${i}, -1)">-</button>
                            <button class="dyn-btn plus" onclick="modLife(${i}, 1)">+</button>
                        </div>
                        <div class="dyn-life" id="pLife${i}">${pLifes[i]}</div>
                    </div>
                `;
            }

            html += `
                <button class="center-menu-btn" aria-label="Menu" onclick="openMenu()">
                    <svg viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" /></svg>
                </button>
            `;

            game.innerHTML = html;
            playFeedback(false);
        }

        function modLife(index, amt) {
            pLifes[index] += amt;
            const el = document.getElementById(`pLife${index}`);
            el.innerText = pLifes[index];
            triggerAnim(el);
            playFeedback(false);
        }

        function openMenu() {
            if (confirm("Deseja voltar ao Menu e redefinir a partida? O placar atual será perdido.")) {
                isGameActive = false;
                document.getElementById('life-game').style.display = 'none';
                document.getElementById('life-setup').style.display = 'flex';
                document.getElementById('mainHeader').style.display = 'flex';
                document.querySelector('.bottom-nav').style.background = 'rgba(13, 14, 21, 0.8)';
                playFeedback(true);
            }
        }

        // Inicializa aba vida - Mostra setup por padrao.
        switchTab('life', 'VIDA MULTIPLAYER');

        // --- DICE & COIN ---
        function rollTarget(sides) {
            let res = Math.floor(Math.random() * sides) + 1;
            const el = document.getElementById('diceResult');
            el.innerText = res;
            triggerAnim(el);
            playFeedback(false);
        }
        function flipCoin() {
            let res = Math.random() < 0.5 ? "CARA" : "COROA";
            const el = document.getElementById('diceResult');
            el.innerText = res;
            triggerAnim(el);
            playFeedback(false, true);
        }

        // --- COUNTERS ---
        let counters = { cPoison: 0, cEnergy: 0, cCmd: 0 };
        function adjCounter(id, amount) {
            counters[id] += amount;
            if (counters[id] < 0) counters[id] = 0;
            const el = document.getElementById(id);
            el.innerText = counters[id];
            triggerAnim(el);
            playFeedback(false);
        }
        function resetCounters() {
            if (confirm("Zerar todos os marcadores?")) {
                counters = { cPoison: 0, cEnergy: 0, cCmd: 0 };
                document.getElementById('cPoison').innerText = '0';
                document.getElementById('cEnergy').innerText = '0';
                document.getElementById('cCmd').innerText = '0';
                playFeedback(true);
            }
        }

        // --- CREATURE ---
        let powerStat = 0;
        const powerDisplay = document.getElementById('power');
        function changePower(amount) {
            powerStat += amount;
            if (powerStat < 0) powerStat = 0;
            powerDisplay.innerText = powerStat + " / " + powerStat;
            triggerAnim(powerDisplay);
            playFeedback(false);
        }
        function resetPower() {
            if (powerStat !== 0 && confirm("Deseja zerar os status?")) {
                powerStat = 0;
                powerDisplay.innerText = "0 / 0";
                playFeedback(true);
            }
        }
    </script>
</body>

</html>
